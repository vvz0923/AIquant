
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI量化系统 后端版</title>
<style>
body{
background:#0f172a;
color:white;
font-family:-apple-system;
padding:20px;
}
.card{
background:#1e293b;
padding:20px;
border-radius:18px;
margin-bottom:18px;
}
input,button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
}
input{
background:#334155;
color:white;
}
button{
background:#22c55e;
color:white;
font-weight:bold;
}
.price{
font-size:36px;
font-weight:bold;
color:#22c55e;
}
.balance{
font-size:32px;
font-weight:bold;
color:#38bdf8;
}
</style>
</head>
<body>

<h1>AI量化系统 后端实盘版</h1>

<div class="card">

<h2>Binance API授权</h2>

<input id="apiKey" placeholder="输入API Key">

<input id="secretKey" placeholder="输入Secret Key">

<button onclick="connectBinance()">
连接币安账户
</button>

<p id="status">
未连接
</p>

</div>

<div class="card">

<h2>账户余额</h2>

<div class="balance" id="balance">
$ 0
</div>

</div>

<div class="card">

<h2>ETH实时价格</h2>

<div class="price" id="price">
加载中...
</div>

</div>

<script>

async function loadPrice(){

try{

const response =
await fetch(
'https://api.binance.com/api/v3/ticker/price?symbol=ETHUSDT'
);

const data = await response.json();

document.getElementById("price").innerHTML =
'$ ' + parseFloat(data.price).toFixed(2);

}catch(e){

document.getElementById("price").innerHTML =
'获取失败';

}

}

async function connectBinance(){

const apiKey =
document.getElementById("apiKey").value;

const secretKey =
document.getElementById("secretKey").value;

try{

const response =
await fetch(
'http://localhost:8000/balance',
{
method:'POST',
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify({
api_key:apiKey,
secret_key:secretKey
})
}
);

const data = await response.json();

if(data.balance){

document.getElementById("status").innerHTML =
'币安账户连接成功';

document.getElementById("balance").innerHTML =
'$ ' + data.balance;

}else{

document.getElementById("status").innerHTML =
'API错误';

}

}catch(e){

document.getElementById("status").innerHTML =
'后端连接失败';

}

}

loadPrice();

setInterval(loadPrice,5000);

</script>

</body>
</html>
