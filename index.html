
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI Quant Ultimate V2</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
padding:20px;
}
.card{
background:#1e293b;
padding:20px;
border-radius:16px;
margin-bottom:16px;
}
input,button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
}
button{
background:#22c55e;
color:white;
font-weight:bold;
}
.price{
font-size:36px;
color:#22c55e;
font-weight:bold;
}
.strategy{
background:#0f172a;
padding:15px;
border-radius:12px;
margin-top:12px;
}
.win{
color:#22c55e;
font-size:20px;
font-weight:bold;
}
.reason{
margin-top:10px;
padding-left:18px;
}
.reason li{
margin-bottom:6px;
}
</style>
</head>

<body>

<h1>AI Quant Ultimate V2</h1>

<div class="card">

<h2>Binance API 授权</h2>

<input id="apiKey" placeholder="输入 Binance API Key">

<input id="secretKey" placeholder="输入 Binance Secret Key">

<button onclick="connectBinance()">
连接币安账户
</button>

<p id="status">
未连接
</p>

</div>

<div class="card">

<h2>账户余额</h2>

<div id="balance" class="price">
$0
</div>

</div>

<div class="card">

<h2>ETH 实时价格</h2>

<div id="price" class="price">
加载中...
</div>

</div>

<div class="card">

<h2>AI 实时策略表格</h2>

<div id="strategies">

<div class="strategy">
等待AI分析...
</div>

</div>

</div>

<script>

let currentBalance = 0;

async function loadPrice(){

try{

const r = await fetch(
'https://api.binance.com/api/v3/ticker/price?symbol=ETHUSDT'
);

const d = await r.json();

document.getElementById('price').innerHTML =
'$ ' + parseFloat(d.price).toFixed(2);

}catch(e){

document.getElementById('price').innerHTML =
'获取失败';

}

}

async function connectBinance(){

const apiKey =
document.getElementById('apiKey').value;

const secretKey =
document.getElementById('secretKey').value;

try{

const r = await fetch(
'http://aiquant-backend-production.up.railway.app/balance',
{
method:'POST',
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify({
api_key:apiKey,
secret_key:secretKey
})
}
);

const d = await r.json();

if(d.balance){

currentBalance = parseFloat(d.balance);

document.getElementById('status').innerHTML =
'连接成功';

document.getElementById('balance').innerHTML =
'$ ' + d.balance;

loadStrategies();

}else{

document.getElementById('status').innerHTML =
'API连接失败';

}

}catch(e){

document.getElementById('status').innerHTML =
'后端连接失败';

}

}

async function loadStrategies(){

try{

const r = await fetch(
'http://aiquant-backend-production.up.railway.app/strategies?balance=' + currentBalance
);

const data = await r.json();

let html = '';

data.strategies.forEach((s)=>{

html += `
<div class="strategy">

<h3>${s.name}</h3>

<div class="win">
胜率：${s.win_rate}
</div>

<p>
建议仓位：${s.position}
</p>

<p>
建议杠杆：${s.leverage}
</p>

<p>
止盈：${s.take_profit}
</p>

<p>
止损：${s.stop_loss}
</p>

<ul class="reason">
${s.reasons.map(r=>`<li>${r}</li>`).join('')}
</ul>

</div>
`;

});

document.getElementById('strategies').innerHTML =
html;

}catch(e){

document.getElementById('strategies').innerHTML =
'策略加载失败';

}

}

loadPrice();

setInterval(loadPrice,5000);

</script>

</body>
</html>
